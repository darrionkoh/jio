<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jio!</title>
  <link rel="icon" type="image/svg+xml" href="/src/assets/jioicon.png" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/homepage.css" />
</head>

<body>
  <div class="app">

    <!-- header -->
    <header class="app-header">
      <button id="back-btn" class="back-btn" style="display: none;" aria-label="Go back">
        <span class="chevron-left"></span>
      </button>
      <h1 class="app-title">Jio!</h1>
      <p class="app-sub" id="app-subtitle">Going out in Singapore? We got you.</p>
    </header>

    <main id="main-content">
      <!-- Launcher View -->
      <div id="launcher" class="launcher-grid">
        <div class="feature-card" data-tab="bill">
          <span class="feature-emoji">🧾</span>
          <span class="feature-label">Bill Splitter</span>
        </div>
        <div class="feature-card" data-tab="gst">
          <span class="feature-emoji">🔢</span>
          <span class="feature-label">GST Calculator</span>
        </div>
        <div class="feature-card" data-tab="debts">
          <span class="feature-emoji">🤝</span>
          <span class="feature-label">Owe Money Pay Money</span>
        </div>
        <div class="feature-card" data-tab="spin">
          <span class="feature-emoji">🎰</span>
          <span class="feature-label">Spin The Wheel</span>
        </div>
        <!-- <div class="feature-card" data-tab="events">
          <span class="feature-emoji">📅</span>
          <span class="feature-label">Events</span>
        </div> -->
      </div>

      <!-- Feature Panels (Hidden initially) -->
      <div id="panel-bill" class="panel" style="display: none;"></div>
      <div id="panel-gst" class="panel" style="display: none;"></div>
      <div id="panel-debts" class="panel" style="display: none;"></div>
      <div id="panel-spin" class="panel" style="display: none;"></div>
      <!-- <div id="panel-events" class="panel" style="display: none;"></div> -->
    </main>

  </div>

  <!-- footer -->
  <footer style="text-align: center; padding: 2rem 0 1rem; font-size: 12px; color: var(--color-text-tertiary);">
    Made by Darrion Koh &middot; 2026 &middot; Ver 1.1.1 &copy; All rights reserved.
  </footer>

  <!-- utils -->
  <script src="js/utils/format.js"></script>

  <!-- components -->
  <script src="js/components/bill.js"></script>
  <script src="js/components/gst.js"></script>
  <script src="js/components/debts.js"></script>
  <script src="js/components/spin.js"></script>

  <script src="js/app.js"></script>
</body>

</html>
